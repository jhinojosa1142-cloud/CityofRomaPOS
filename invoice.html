<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice System | City of Roma, TX</title>
  <style>
    :root {
      --roma-blue: #002d5a;
      --roma-light: #0056b3;
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-gradient);
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .invoice-card {
      background: white;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
      position: relative;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--roma-blue);
      margin-bottom: 30px;
      padding-bottom: 20px;
    }

    .logo-area h1 { margin: 0; color: var(--roma-blue); font-size: 1.8rem; }
    .logo-area address { font-style: normal; font-size: 0.9rem; color: #555; line-height: 1.4; }

    /* FORM LAYOUT */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    fieldset { border: 1px solid #ddd; border-radius: 5px; padding: 15px; margin-bottom: 20px; }
    legend { font-weight: bold; color: var(--roma-light); padding: 0 10px; font-size: 0.85rem; text-transform: uppercase; }

    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    input[readonly] { background: #f9f9f9; border-color: #eee; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: #f4f6f8; text-align: left; padding: 12px; font-size: 0.85rem; border-bottom: 2px solid #ddd; }
    td { padding: 10px; border-bottom: 1px solid #eee; }

    /* BUTTONS */
    .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-add { background: #28a745; color: white; margin-top: 10px; }
    .btn-print { background: #6c757d; color: white; }
    .btn-save { background: var(--roma-blue); color: white; flex-grow: 1; }
    .btn:hover { opacity: 0.8; }
    .btn-remove { background: none; color: #dc3545; font-size: 1.2rem; }

    /* TOTALS */
    .totals-box { background: #f8f9fa; padding: 20px; border-radius: 5px; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
    .total-row { display: flex; align-items: center; gap: 15px; }
    .total-row label { font-weight: bold; width: 120px; text-align: right; }
    .total-row input { width: 140px; text-align: right; font-weight: bold; font-size: 1.1rem; }

    /* --- ESTILOS DE IMPRESIÓN --- */
    @media print {
      body { background: white !important; padding: 0; }
      .invoice-card { box-shadow: none !important; border: none !important; width: 100% !important; max-width: 100% !important; }
      .no-print { display: none !important; }
      input, select { border: none !important; background: transparent !important; appearance: none; padding: 2px !important; }
      th { background: #eee !important; color: black !important; }
      .only-print { display: block !important; }
      header { border-bottom: 2px solid black !important; }
    }

    .only-print { display: none; margin-top: 60px; }
  </style>
</head>
<body>

<div class="invoice-card">
  <header>
    <div class="logo-area">
      <h1>City of Roma, Texas</h1>
      <address>
        P.O. Box 947, Roma, TX 78584<br>
        Ph: 956-849-1411 | Fax: 956-849-4311
      </address>
    </div>
    <div style="text-align: right;">
      <h2 style="margin:0; color: var(--roma-light);">INVOICE</h2>
      <p id="dateField" style="font-weight: bold;"></p>
    </div>
  </header>

  <form id="invoiceForm">
    <div class="grid">
      <div>
        <label>Department</label>
        <select name="Department" id="dept" required>
          <option value="Administration">Administration</option>
          <option value="Planning & Zoning">Planning & Zoning</option>
          <option value="Police Department">Police Department</option>
          <option value="Fire Department">Fire Department</option>
        </select>
      </div>
      <div>
        <label>Invoice #</label>
        <input type="text" name="InvoiceNumber" id="invNum" readonly placeholder="Auto-generated">
      </div>
      <div>
        <label>Payment Method</label>
        <select name="PaymentMethod" id="payMethod">
          <option value="Cash">Cash</option>
          <option value="Check">Check</option>
          <option value="Credit Card">Credit Card (3% Fee)</option>
        </select>
      </div>
    </div>

    <fieldset>
      <legend>Fee Details</legend>
      <table id="feeTable">
        <thead>
          <tr>
            <th>Category</th>
            <th>Description</th>
            <th style="width: 70px;">Qty</th>
            <th style="width: 130px;">Unit Price ($)</th>
            <th class="no-print" style="width: 40px;"></th>
          </tr>
        </thead>
        <tbody id="feeBody">
          </tbody>
      </table>
      <button type="button" class="btn btn-add no-print" onclick="addRow()">+ Add Line Item</button>
    </fieldset>

    <div class="grid" style="grid-template-columns: 1.5fr 1fr;">
      <fieldset>
        <legend>Billing To</legend>
        <input type="text" name="CustomerName" placeholder="Customer / Business Name" required style="margin-bottom: 10px;">
        <input type="text" name="Address" placeholder="Address Line" style="margin-bottom: 10px;">
        <div style="display: flex; gap: 5px;">
          <input type="text" name="City" value="Roma" placeholder="City">
          <input type="text" name="State" value="TX" style="width: 60px;">
          <input type="text" name="Zip" value="78584" style="width: 100px;">
        </div>
      </fieldset>

      <div class="totals-box">
        <div class="total-row">
          <label>Subtotal:</label>
          <input type="number" id="subtotal" name="Subtotal" readonly value="0.00">
        </div>
        <div class="total-row">
          <label>Card Fee (3%):</label>
          <input type="number" id="tax" name="CardFee" readonly value="0.00">
        </div>
        <div class="total-row">
          <label>TOTAL USD:</label>
          <input type="number" id="total" name="GrandTotal" readonly value="0.00" style="background: #eefae1; border: 1px solid #28a745;">
        </div>
      </div>
    </div>

    <div class="only-print">
      <div style="display: flex; justify-content: space-between;">
        <div style="border-top: 1px solid black; width: 250px; text-align: center; padding-top: 5px;">City Representative</div>
        <div style="border-top: 1px solid black; width: 250px; text-align: center; padding-top: 5px;">Customer Signature</div>
      </div>
    </div>

    <div class="no-print" style="display: flex; gap: 10px; margin-top: 30px;">
      <button type="button" class="btn btn-print" onclick="preparePrint()">🖨️ Print Invoice</button>
      <button type="submit" class="btn btn-save">💾 Save to SharePoint</button>
    </div>
  </form>
</div>

<template id="rowTemplate">
  <tr>
    <td>
      <select name="type[]">
        <option value="Permit">Permit</option>
        <option value="Zoning">Zoning</option>
        <option value="Fine">Fine</option>
        <option value="Other">Other</option>
      </select>
    </td>
    <td><input type="text" name="desc[]" placeholder="Description" required></td>
    <td><input type="number" name="qty[]" class="qty" value="1" min="1"></td>
    <td><input type="number" name="cost[]" class="cost" value="0.00" step="0.01"></td>
    <td class="no-print"><button type="button" class="btn-remove" onclick="this.closest('tr').remove(); calc();">&times;</button></td>
  </tr>
</template>

<script>
  // Inicialización
  document.getElementById('dateField').innerText = new Date().toLocaleDateString();
  const feeBody = document.getElementById('feeBody');
  const rowTemp = document.getElementById('rowTemplate');

  function addRow() {
    const clone = rowTemp.content.cloneNode(true);
    feeBody.appendChild(clone);
    attachEvents();
  }

  function attachEvents() {
    const inputs = feeBody.querySelectorAll('input');
    inputs.forEach(i => i.addEventListener('input', calc));
    document.getElementById('payMethod').addEventListener('change', calc);
  }

  function calc() {
    let sub = 0;
    const rows = feeBody.querySelectorAll('tr');
    rows.forEach(r => {
      const q = r.querySelector('.qty').value || 0;
      const c = r.querySelector('.cost').value || 0;
      sub += (q * c);
    });

    const isCard = document.getElementById('payMethod').value === "Credit Card";
    const fee = isCard ? sub * 0.03 : 0;
    
    document.getElementById('subtotal').value = sub.toFixed(2);
    document.getElementById('tax').value = fee.toFixed(2);
    document.getElementById('total').value = (sub + fee).toFixed(2);
  }

  function preparePrint() {
    if(!document.getElementById('invNum').value) {
      document.getElementById('invNum').value = "ROMA-" + Math.floor(1000 + Math.random() * 9000);
    }
    window.print();
  }

  document.getElementById('invoiceForm').onsubmit = (e) => {
    e.preventDefault();
    alert("Data Ready! Connecting to City of Roma SharePoint...");
    // Aquí iría tu fetch() hacia Power Automate
  };

  // Fila inicial
  addRow();
</script>

</body>
</html>
