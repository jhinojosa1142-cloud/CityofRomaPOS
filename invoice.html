<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice System | City of Roma, TX</title>
  <style>
    /* VARIABLES DE MARCA Y UI */
    :root {
      --roma-blue: #002d5a;
      --roma-light: #0056b3;
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }

    body {
      font-family: 'Segoe UI', Segoe, Tahoma, Arial, sans-serif;
      background: var(--bg-gradient);
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .invoice-card {
      background: white;
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--roma-blue);
      margin-bottom: 25px;
      padding-bottom: 15px;
    }

    .logo-area h1 { margin: 0; color: var(--roma-blue); font-size: 1.8rem; }
    .logo-area address { font-style: normal; font-size: 0.85rem; color: #555; line-height: 1.4; }

    /* FORM LAYOUT */
    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 15px; 
      margin-bottom: 15px; 
    }
    
    fieldset { border: 1px solid #ddd; border-radius: 5px; padding: 15px; margin-bottom: 20px; }
    legend { font-weight: bold; color: var(--roma-light); padding: 0 10px; font-size: 0.85rem; text-transform: uppercase; }

    label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #666; }
    input, select, textarea { 
      width: 100%; 
      padding: 8px 10px; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
      box-sizing: border-box;
      font-size: 0.95rem;
    }
    input[readonly] { background: #f9f9f9; border-color: #eee; cursor: not-allowed; }

    /* TABLE */
    .table-responsive { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
    th { background: #f4f6f8; text-align: left; padding: 10px; font-size: 0.8rem; border-bottom: 2px solid #ddd; }
    td { padding: 8px 5px; border-bottom: 1px solid #eee; vertical-align: middle; }

    /* BUTTONS */
    .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-add { background: #28a745; color: white; margin-top: 10px; }
    .btn-print { background: #6c757d; color: white; }
    .btn-save { background: var(--roma-blue); color: white; flex-grow: 1; }
    .btn:hover { opacity: 0.8; }
    .btn-remove { background: none; color: #dc3545; font-size: 1.4rem; border: none; cursor: pointer; padding: 0 10px; }

    /* TOTALS */
    .totals-box { 
      background: #f8f9fa; 
      padding: 15px; 
      border-radius: 5px; 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
      align-items: flex-end; 
    }
    .total-row { display: flex; align-items: center; gap: 15px; }
    .total-row label { margin: 0; width: 110px; text-align: right; font-size: 0.9rem; }
    .total-row input { width: 130px; text-align: right; font-weight: bold; font-size: 1rem; border: 1px solid #ddd; }
    #grandTotal { background: #eefae1; border: 2px solid #28a745; color: #1e5628; font-size: 1.2rem; }

    /* --- FIX: CORRECCIÓN DE IMPRESIÓN (SIN CORTES) --- */
    @media print {
      @page { size: letter; margin: 0.5in; }
      
      body { background: white !important; padding: 0 !important; margin: 0 !important; }
      .invoice-card { 
        box-shadow: none !important; 
        border: none !important; 
        width: 100% !important; 
        max-width: 100% !important; 
        padding: 0 !important; 
      }
      
      .no-print { display: none !important; }
      
      header { border-bottom: 2px solid #000 !important; margin-bottom: 20px; }
      h1, h2, legend { color: #000 !important; }

      /* Ajuste de columnas en Grid para papel */
      .grid { display: flex !important; flex-wrap: nowrap !important; gap: 10px !important; }
      .grid > div { flex: 1 !important; }

      table { border: 1px solid #eee !important; table-layout: auto !important; }
      th { background: #f0f0f0 !important; color: #000 !important; border-bottom: 1px solid #000 !important; }
      
      input, select, textarea { 
        border: none !important; 
        background: transparent !important; 
        padding: 2px !important; 
        appearance: none; 
      }

      .only-print { display: block !important; }
      .totals-box { background: transparent !important; border-top: 1px solid #eee; }
    }

    .only-print { display: none; margin-top: 50px; }
  </style>
</head>
<body>

<div class="invoice-card">
  <header>
    <div class="logo-area">
      <h1>City of Roma, Texas</h1>
      <address>
        P.O. Box 947, Roma, TX 78584<br>
        Ph: 956-849-1411 | Fax: 956-849-4311
      </address>
    </div>
    <div style="text-align: right;">
      <h2 style="margin:0; color: var(--roma-light);">INVOICE</h2>
      <p id="dateDisplay" style="font-weight: bold; margin: 5px 0 0 0;"></p>
    </div>
  </header>

  <form id="invoiceForm">
    <div class="grid">
      <div>
        <label for="dept">Department</label>
        <select name="Department" id="dept" required>
          <option value="Administration">Administration</option>
          <option value="Planning & Zoning">Planning & Zoning</option>
          <option value="Police Department">Police Department</option>
          <option value="Fire Department">Fire Department</option>
        </select>
      </div>
      <div>
        <label for="invNum">Invoice #</label>
        <input type="text" name="InvoiceNumber" id="invNum" readonly placeholder="ROMA-XXXX">
      </div>
      <div>
        <label for="payMethod">Payment Method</label>
        <select name="PaymentMethod" id="payMethod">
          <option value="Cash">Cash</option>
          <option value="Check">Check</option>
          <option value="Credit Card">Credit Card (3% Fee)</option>
        </select>
      </div>
    </div>

    <fieldset>
      <legend>Description of Charges</legend>
      <div class="table-responsive">
        <table id="feeTable">
          <thead>
            <tr>
              <th style="width: 20%;">Category</th>
              <th style="width: 45%;">Description</th>
              <th style="width: 10%;">Qty</th>
              <th style="width: 20%;">Price ($)</th>
              <th class="no-print" style="width: 50px;"></th>
            </tr>
          </thead>
          <tbody id="feeBody">
            </tbody>
        </table>
      </div>
      <button type="button" class="btn btn-add no-print" onclick="addRow()">
        <span>+</span> Add Line Item
      </button>
    </fieldset>

    <div class="grid" style="grid-template-columns: 1.4fr 1fr;">
      <fieldset>
        <legend>Bill To:</legend>
        <div style="margin-bottom: 10px;">
          <label>Customer / Business Name</label>
          <input type="text" name="CustomerName" placeholder="Required" required>
        </div>
        <div style="margin-bottom: 10px;">
          <label>Address</label>
          <input type="text" name="Address" placeholder="Street Address">
        </div>
        <div style="display: flex; gap: 10px;">
          <div style="flex: 2;"><label>City</label><input type="text" name="City" value="Roma"></div>
          <div style="flex: 0.5;"><label>ST</label><input type="text" name="State" value="TX"></div>
          <div style="flex: 1;"><label>Zip</label><input type="text" name="Zip" value="78584"></div>
        </div>
      </fieldset>

      <div class="totals-box">
        <div class="total-row">
          <label>Subtotal:</label>
          <input type="number" id="subtotal" name="Subtotal" readonly value="0.00">
        </div>
        <div class="total-row">
          <label id="feeLabel">Card Fee (0%):</label>
          <input type="number" id="cardFee" name="CardFee" readonly value="0.00">
        </div>
        <div class="total-row" style="margin-top: 5px; border-top: 2px solid #ddd; padding-top: 10px;">
          <label style="font-size: 1rem; color: var(--roma-blue);">TOTAL USD:</label>
          <input type="number" id="grandTotal" name="GrandTotal" readonly value="0.00">
        </div>
      </div>
    </div>

    <div class="only-print">
      <div style="display: flex; justify-content: space-between; gap: 50px;">
        <div style="flex: 1; border-top: 1.5px solid #000; text-align: center; padding-top: 8px;">
          <p style="font-size: 0.8rem; font-weight: bold; margin: 0;">CITY REPRESENTATIVE</p>
        </div>
        <div style="flex: 1; border-top: 1.5px solid #000; text-align: center; padding-top: 8px;">
          <p style="font-size: 0.8rem; font-weight: bold; margin: 0;">CUSTOMER ACKNOWLEDGMENT</p>
        </div>
      </div>
      <p style="font-size: 0.7rem; color: #555; margin-top: 20px; text-align: center;">
        Official Document - City of Roma, Texas. Thank you for your payment.
      </p>
    </div>

    <div class="no-print" style="display: flex; gap: 15px; margin-top: 20px;">
      <button type="button" class="btn btn-print" onclick="handlePrint()">
        🖨️ Print Professional Invoice
      </button>
      <button type="submit" class="btn btn-save">
        💾 Save & Sync SharePoint
      </button>
    </div>
  </form>
</div>

<template id="rowTemplate">
  <tr>
    <td>
      <select name="type[]">
        <option value="Permit">Permit</option>
        <option value="Zoning">Zoning</option>
        <option value="Fine">Fine/Citation</option>
        <option value="Utility">Utility</option>
        <option value="Other">Other</option>
      </select>
    </td>
    <td><input type="text" name="desc[]" placeholder="Brief detail..." required></td>
    <td><input type="number" name="qty[]" class="qty-trigger" value="1" min="1"></td>
    <td><input type="number" name="cost[]" class="cost-trigger" value="0.00" step="0.01"></td>
    <td class="no-print">
      <button type="button" class="btn-remove" onclick="removeRow(this)">&times;</button>
    </td>
  </tr>
</template>

<script>
  // 1. Inicialización de Fecha
  document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-US', {
    year: 'numeric', month: 'long', day: 'numeric'
  });

  const feeBody = document.getElementById('feeBody');
  const rowTemp = document.getElementById('rowTemplate');

  // 2. Función: Agregar fila
  function addRow() {
    const clone = rowTemp.content.cloneNode(true);
    feeBody.appendChild(clone);
    attachCalculationListeners();
    calculateTotals();
  }

  // 3. Función: Eliminar fila
  function removeRow(btn) {
    btn.closest('tr').remove();
    calculateTotals();
  }

  // 4. Función: Escuchar cambios en inputs
  function attachCalculationListeners() {
    const triggers = feeBody.querySelectorAll('.qty-trigger, .cost-trigger');
    triggers.forEach(input => {
      input.removeEventListener('input', calculateTotals); // Evita duplicados
      input.addEventListener('input', calculateTotals);
    });
  }

  document.getElementById('payMethod').addEventListener('change', calculateTotals);

  // 5. Función: Cálculos Financieros
  function calculateTotals() {
    let sub = 0;
    const rows = feeBody.querySelectorAll('tr');
    
    rows.forEach(row => {
      const q = parseFloat(row.querySelector('.qty-trigger').value) || 0;
      const c = parseFloat(row.querySelector('.cost-trigger').value) || 0;
      sub += (q * c);
    });

    const isCard = document.getElementById('payMethod').value === "Credit Card";
    const feePercent = isCard ? 0.03 : 0;
    const feeAmount = sub * feePercent;
    
    document.getElementById('subtotal').value = sub.toFixed(2);
    document.getElementById('cardFee').value = feeAmount.toFixed(2);
    document.getElementById('feeLabel').innerText = `Card Fee (${(feePercent*100)}%):`;
    document.getElementById('grandTotal').value = (sub + feeAmount).toFixed(2);
  }

  // 6. Función: Preparar Impresión
  function handlePrint() {
    // Generar Folio si no existe
    const invField = document.getElementById('invNum');
    if (!invField.value || invField.value === "ROMA-XXXX") {
      invField.value = "ROMA-" + Math.floor(100000 + Math.random() * 900000);
    }
    
    window.print();
  }

  // 7. Simulación de SharePoint
  document.getElementById('invoiceForm').onsubmit = (e) => {
    e.preventDefault();
    const data = new FormData(e.target);
    console.log("Saving to SharePoint...", Object.fromEntries(data.entries()));
    alert("🚀 Data captured! In a real scenario, this would sync with your SharePoint List.");
  };

  // Fila inicial al cargar
  addRow();
</script>

</body>
</html>
